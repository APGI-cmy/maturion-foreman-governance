name: Governance Scope-to-Diff Enforcement

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  scope-to-diff-validation:
    name: Validate Per-PR Scope Declaration Matches Diff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MATURION_BOT_TOKEN }}

      - name: Token identity evidence (REQ-TU-003)
        run: echo "EXEC_IDENTITY: MATURION_BOT_TOKEN in use for write operations"

      - name: Resolve PR number and per-PR scope file path
        id: resolve_scope
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -z "${PR_NUMBER}" ]; then
            echo "❌ PR number is not available — this workflow must run on pull_request events"
            exit 1
          fi
          SCOPE_FILE=".agent-admin/scope-declarations/pr-${PR_NUMBER}.md"
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "scope_file=${SCOPE_FILE}" >> $GITHUB_OUTPUT
          echo "PR Number: ${PR_NUMBER}"
          echo "Per-PR scope file: ${SCOPE_FILE}"

      - name: Check for PREHANDOVER_PROOF evidence-based validation
        id: check_evidence
        run: |
          echo "Checking for evidence-based validation in PREHANDOVER_PROOF..."
          
          # Check if PREHANDOVER_PROOF.md exists in governance directory
          if [ -f "governance/PREHANDOVER_PROOF.md" ]; then
            echo "evidence_file_exists=true" >> $GITHUB_OUTPUT
            
            # Check if it contains scope-to-diff validation evidence
            if grep -qi "scope.*to.*diff\|scope.*declaration" governance/PREHANDOVER_PROOF.md; then
              echo "evidence_found=true" >> $GITHUB_OUTPUT
              echo "✓ PREHANDOVER_PROOF.md contains scope validation evidence"
              
              # Check for attestation/signature
              if grep -qi "attestation\|signature\|manually verified\|evidence-based" governance/PREHANDOVER_PROOF.md; then
                echo "attestation_found=true" >> $GITHUB_OUTPUT
                echo "✓ Attestation/signature found in PREHANDOVER_PROOF"
              else
                echo "attestation_found=false" >> $GITHUB_OUTPUT
                echo "⚠️ No attestation/signature found in PREHANDOVER_PROOF"
              fi
            else
              echo "evidence_found=false" >> $GITHUB_OUTPUT
              echo "⚠️ PREHANDOVER_PROOF.md exists but no scope validation evidence found"
            fi
          else
            echo "evidence_file_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ PREHANDOVER_PROOF.md not found in governance directory"
          fi

      - name: Enforce per-PR scope-to-diff (script execution path)
        id: script_validation
        continue-on-error: true
        env:
          PR_NUMBER: ${{ steps.resolve_scope.outputs.pr_number }}
        run: |
          SCOPE_FILE="${{ steps.resolve_scope.outputs.scope_file }}"

          # Per-PR scope model: validate .agent-admin/scope-declarations/pr-${PR_NUMBER}.md
          if [ ! -f "${SCOPE_FILE}" ]; then
            echo "❌ Per-PR scope declaration not found: ${SCOPE_FILE}"
            echo "   Each PR must create its own scope declaration at this path."
            echo "   See .agent-admin/scope-declarations/README.md for instructions."
            exit 1
          fi

          echo "✓ Per-PR scope declaration found: ${SCOPE_FILE}"

          # Determine base branch
          BASE_REF="${{ github.base_ref }}"
          git fetch origin $BASE_REF

          # Get actual changed files (PR diff basis: merge-base of origin/$BASE_REF and HEAD)
          FILES=$(git diff --name-only origin/$BASE_REF...HEAD)

          if [ -z "$FILES" ]; then
            echo "⚠️ No changed files detected — skipping file-list validation"
            echo "script_passed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files in diff:"
          echo "$FILES" | while read -r f; do echo "  - $f"; done

          # Extract declared files from per-PR scope declaration (## FILES_CHANGED section)
          DECLARED_FILES=$(awk '/^## FILES_CHANGED/{found=1; next} found && /^- /{print substr($0,3)} found && /^##/{if(!/FILES_CHANGED/)found=0}' "${SCOPE_FILE}" || echo "")

          if [ -z "$DECLARED_FILES" ]; then
            echo "⚠️ No file changes declared in ${SCOPE_FILE}"
            echo "   Add a ## FILES_CHANGED section listing all changed files."
            exit 1
          fi

          echo "Declared files in scope:"
          echo "$DECLARED_FILES" | while read -r f; do echo "  - $f"; done

          # Validate: all changed files are declared
          UNDECLARED=()
          while IFS= read -r file; do
            if ! echo "$DECLARED_FILES" | grep -qxF "$file"; then
              UNDECLARED+=("$file")
            fi
          done <<< "$FILES"

          # Validate: all declared files are changed
          EXTRA_DECLARED=()
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if ! echo "$FILES" | grep -qxF "$file"; then
              EXTRA_DECLARED+=("$file")
            fi
          done <<< "$DECLARED_FILES"

          if [ ${#UNDECLARED[@]} -eq 0 ] && [ ${#EXTRA_DECLARED[@]} -eq 0 ]; then
            echo "✅ Scope-to-diff enforcement passed for pr-${PR_NUMBER}.md"
            echo "script_passed=true" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "❌ Scope declaration does not match diff"
            if [ ${#UNDECLARED[@]} -gt 0 ]; then
              echo "Files changed but NOT declared:"
              for f in "${UNDECLARED[@]}"; do echo "  - $f"; done
            fi
            if [ ${#EXTRA_DECLARED[@]} -gt 0 ]; then
              echo "Files declared but NOT changed:"
              for f in "${EXTRA_DECLARED[@]}"; do echo "  - $f"; done
            fi
            exit 1
          fi

      - name: Determine validation result
        id: determine_result
        run: |
          SCRIPT_PASSED="${{ steps.script_validation.outcome }}"
          EVIDENCE_EXISTS="${{ steps.check_evidence.outputs.evidence_file_exists }}"
          EVIDENCE_FOUND="${{ steps.check_evidence.outputs.evidence_found }}"
          ATTESTATION_FOUND="${{ steps.check_evidence.outputs.attestation_found }}"
          PR_NUMBER="${{ steps.resolve_scope.outputs.pr_number }}"
          SCOPE_FILE="${{ steps.resolve_scope.outputs.scope_file }}"
          
          echo "==================================="
          echo "Per-PR Scope-to-Diff Validation Results"
          echo "PR: #${PR_NUMBER}"
          echo "Scope file: ${SCOPE_FILE}"
          echo "==================================="
          echo ""
          echo "Script execution path: $SCRIPT_PASSED"
          echo "Evidence-based path available: $EVIDENCE_EXISTS"
          echo "Evidence found: $EVIDENCE_FOUND"
          echo "Attestation found: $ATTESTATION_FOUND"
          echo ""
          
          # Check Path 1: Script execution succeeded
          if [ "$SCRIPT_PASSED" = "success" ]; then
            echo "✅ PASS: Script execution path succeeded"
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "method=script" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check Path 2: Evidence-based validation
          if [ "$EVIDENCE_EXISTS" = "true" ] && [ "$EVIDENCE_FOUND" = "true" ] && [ "$ATTESTATION_FOUND" = "true" ]; then
            echo "✅ PASS: Evidence-based validation path accepted"
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "method=evidence" >> $GITHUB_OUTPUT
            echo ""
            echo "Note: This PR used evidence-based validation (BL-027 compliant)"
            echo "PREHANDOVER_PROOF contains manual scope verification with attestation"
            exit 0
          fi
          
          # Neither path succeeded - FAIL
          echo "❌ FAIL: Neither validation path succeeded"
          echo "result=fail" >> $GITHUB_OUTPUT
          echo "method=none" >> $GITHUB_OUTPUT
          echo ""
          echo "BL-027 requires scope-to-diff validation via ONE of these paths:"
          echo ""
          echo "PATH 1: Per-PR Scope Declaration (Preferred)"
          echo "  - Per-PR scope file exists: $([[ -f "${SCOPE_FILE}" ]] && echo '✅' || echo '❌')"
          echo "  - Script validation passed: $([[ $SCRIPT_PASSED = 'success' ]] && echo '✅' || echo '❌')"
          echo ""
          echo "PATH 2: Evidence-Based Validation (Agent Environments)"
          echo "  - PREHANDOVER_PROOF exists: $([[ $EVIDENCE_EXISTS = 'true' ]] && echo '✅' || echo '❌')"
          echo "  - Contains scope validation: $([[ $EVIDENCE_FOUND = 'true' ]] && echo '✅' || echo '❌')"
          echo "  - Contains attestation: $([[ $ATTESTATION_FOUND = 'true' ]] && echo '✅' || echo '❌')"
          echo ""
          echo "See .agent-admin/scope-declarations/README.md for the required per-PR format"
          echo ""
          exit 1

      - name: Post validation report (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MATURION_BOT_TOKEN }}
          script: |
            const result = '${{ steps.determine_result.outputs.result }}';
            const method = '${{ steps.determine_result.outputs.method }}';
            const prNumber = '${{ steps.resolve_scope.outputs.pr_number }}';
            const scopeFile = '${{ steps.resolve_scope.outputs.scope_file }}';
            
            let comment = '## 🎯 Scope-to-Diff Validation (BL-027)\n\n';
            comment += `**PR**: #${prNumber}\n`;
            comment += `**Per-PR scope file**: \`${scopeFile}\`\n\n`;
            
            if (result === 'pass') {
              comment += `**Status**: ✅ PASSED\n`;
              comment += `**Method**: ${method === 'script' ? 'Script Execution' : 'Evidence-Based Validation'}\n\n`;
              
              if (method === 'evidence') {
                comment += '**Note**: This PR used evidence-based validation, which is compliant with BL-027 for agent environments where script execution is not available before PR creation.\n\n';
                comment += 'Evidence includes:\n';
                comment += '- Manual scope declaration\n';
                comment += '- Comparison against git diff\n';
                comment += '- Attestation/signature in PREHANDOVER_PROOF\n\n';
              }
            } else {
              comment += `**Status**: ❌ FAILED\n\n`;
              comment += '**Required**: BL-027 mandates scope-to-diff validation via ONE of these paths:\n\n';
              comment += `### Path 1: Per-PR Scope Declaration (Preferred)\n`;
              comment += `Create \`${scopeFile}\` listing all changed files.\n\n`;
              comment += '```bash\n';
              comment += `# Generate the file list:\n`;
              comment += 'git diff --name-only origin/main...HEAD\n';
              comment += '```\n\n';
              comment += 'See `.agent-admin/scope-declarations/README.md` for the required format.\n\n';
              comment += '### Path 2: Evidence-Based Validation (Agent Environments)\n';
              comment += '- Create `governance/PREHANDOVER_PROOF.md` in governance directory\n';
              comment += '- Document manual scope-to-diff comparison\n';
              comment += '- Include attestation that all files match\n';
              comment += '- Sign with agent name and timestamp\n\n';
            }
            
            comment += '---\n';
            comment += '*Authority: BL-027 (Scope Declaration Mandatory Before PR Handover) | Issue #1359 (Per-PR Immutable Scope Model)*\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Final gate status
        run: |
          if [ "${{ steps.determine_result.outputs.result }}" = "pass" ]; then
            echo "✅ Scope-to-Diff Gate PASSED"
            exit 0
          else
            echo "❌ Scope-to-Diff Gate FAILED"
            exit 1
          fi
