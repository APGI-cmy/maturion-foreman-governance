name: Governance Ceremony Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: read
  pull-requests: read

jobs:
  # Job 1: Draft PR Check
  # Detuned: draft PRs are informational-only — gate does not block WIP branches
  draft-check:
    name: governance-ceremony/draft-check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR draft state
        env:
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "=== Governance Ceremony — Draft Check ==="
          echo "PR: #${PR_NUMBER}"
          echo "Draft state: ${IS_DRAFT}"
          echo ""

          if [ "${IS_DRAFT}" = "true" ]; then
            echo "ℹ️  PR is in draft/WIP state."
            echo "ℹ️  Governance ceremony proceeds — draft PRs are not blocked by this gate."
            echo "ℹ️  Evidence artifacts must be complete and PR marked ready before merge."
            echo "ℹ️  Per governance paradox mitigation protocol: gate fix present but unmerged"
            echo "    PRs may be in draft while work is in progress."
          else
            echo "✅ PR is marked ready for review."
          fi

          echo ""
          echo "✅ governance-ceremony/draft-check: PASS"

  # Job 2: Governance Ceremony Verdict
  # Widened: accepts PREHANDOVER proof from all valid locations per latest protocol
  # Accepts both ## Governance and ### Governance blocks in proof files
  verdict:
    name: governance-ceremony/verdict
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify governance ceremony evidence
        run: |
          echo "=== Governance Ceremony — Verdict ==="
          echo ""

          PROOF_FOUND=false
          PROOF_FILE=""

          # Check all valid PREHANDOVER proof locations (widened per latest protocol)

          # Location 1: .agent-admin/prehandover/ — canonical location
          if [ -f ".agent-admin/prehandover/prehandover_proof.md" ]; then
            PROOF_FOUND=true
            PROOF_FILE=".agent-admin/prehandover/prehandover_proof.md"
            echo "✅ Found canonical prehandover proof: ${PROOF_FILE}"
          elif ls .agent-admin/prehandover/prehandover_proof_*.md 1>/dev/null 2>&1; then
            PROOF_FOUND=true
            PROOF_FILE=$(ls .agent-admin/prehandover/prehandover_proof_*.md | tail -1)
            echo "✅ Found PR-specific prehandover proof: ${PROOF_FILE}"
          elif ls .agent-admin/prehandover/proof-*.md 1>/dev/null 2>&1; then
            PROOF_FOUND=true
            PROOF_FILE=$(ls .agent-admin/prehandover/proof-*.md | tail -1)
            echo "✅ Found timestamped prehandover proof: ${PROOF_FILE}"

          # Location 2: repository root — legacy/transitional location
          elif [ -f "PREHANDOVER_PROOF.md" ]; then
            PROOF_FOUND=true
            PROOF_FILE="PREHANDOVER_PROOF.md"
            echo "✅ Found root prehandover proof: ${PROOF_FILE}"
          elif ls PREHANDOVER_PROOF_*.md 1>/dev/null 2>&1; then
            PROOF_FOUND=true
            PROOF_FILE=$(ls PREHANDOVER_PROOF_*.md | tail -1)
            echo "✅ Found root prehandover proof (versioned): ${PROOF_FILE}"
          fi

          if [ "${PROOF_FOUND}" = "false" ]; then
            echo "❌ GOVERNANCE CEREMONY VERDICT: FAIL"
            echo ""
            echo "No PREHANDOVER proof found in any accepted location:"
            echo "  - .agent-admin/prehandover/prehandover_proof.md"
            echo "  - .agent-admin/prehandover/prehandover_proof_<PR#>_<date>.md"
            echo "  - .agent-admin/prehandover/proof-<timestamp>.md"
            echo "  - PREHANDOVER_PROOF.md (root)"
            echo "  - PREHANDOVER_PROOF_*.md (root)"
            echo ""
            echo "Required action: Create a PREHANDOVER proof artifact before merging."
            echo "Reference: governance/canon/AGENT_HANDOVER_AUTOMATION.md"
            exit 1
          fi

          echo ""
          echo "--- Validating proof content ---"

          # Accept ## Governance OR ### Governance blocks per latest protocol
          if grep -qE "^#{2,3} Governance" "${PROOF_FILE}"; then
            echo "✅ Governance block found (## Governance or ### Governance)"
          else
            echo "ℹ️  No ## or ### Governance block detected — proof accepted without governance block"
            echo "   (Governance block is recommended per AGENT_HANDOVER_AUTOMATION.md §4.1)"
          fi

          echo ""
          echo "✅ governance-ceremony/verdict: PASS"
          echo "   Proof: ${PROOF_FILE}"

  # Job 3: Phase 4 Completeness Check
  # Verifies all required Phase 4 artifacts are present per OPOJD v2.1 and MERGE_GATE_PHILOSOPHY v2.1.0
  phase4-completeness:
    name: governance-ceremony/phase4-completeness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Phase 4 artifact completeness
        run: |
          echo "=== Governance Ceremony — Phase 4 Completeness Check ==="
          echo "Authority: governance/opojd/OPOJD_COMPLETE_JOB_HANDOVER_DOCTRINE.md v2.1"
          echo "           governance/canon/MERGE_GATE_PHILOSOPHY.md v2.1.0"
          echo ""

          MISSING_ARTIFACTS=()

          # ── Check 1: PREHANDOVER proof ──────────────────────────────────────
          echo "Checking: PREHANDOVER proof..."

          PROOF_FOUND=false

          if ls .agent-admin/prehandover/proof-*.md 1>/dev/null 2>&1; then
            PROOF_FOUND=true
          elif ls .agent-admin/prehandover/prehandover_proof*.md 1>/dev/null 2>&1; then
            PROOF_FOUND=true
          elif ls PREHANDOVER_PROOF*.md 1>/dev/null 2>&1; then
            PROOF_FOUND=true
          fi

          if [ "${PROOF_FOUND}" = "true" ]; then
            echo "  ✅ PREHANDOVER proof: PRESENT"
          else
            echo "  ❌ PREHANDOVER proof: ABSENT"
            MISSING_ARTIFACTS+=("PREHANDOVER proof (.agent-admin/prehandover/proof-*.md or prehandover_proof*.md)")
          fi

          # ── Check 2: Session memory ─────────────────────────────────────────
          echo "Checking: Session memory..."

          MEMORY_FOUND=false
          if find .agent-workspace -maxdepth 3 -path "*/memory/session-*.md" -type f 2>/dev/null | grep -q .; then
            MEMORY_FOUND=true
          fi

          if [ "${MEMORY_FOUND}" = "true" ]; then
            echo "  ✅ Session memory: PRESENT"
          else
            echo "  ❌ Session memory: ABSENT"
            MISSING_ARTIFACTS+=("Session memory (.agent-workspace/<agent>/memory/session-*.md)")
          fi

          # ── Evaluate ────────────────────────────────────────────────────────
          echo ""
          if [ ${#MISSING_ARTIFACTS[@]} -gt 0 ]; then
            echo "❌ PHASE 4 COMPLETENESS CHECK FAILED"
            echo ""
            echo "Missing required Phase 4 artifacts:"
            for artifact in "${MISSING_ARTIFACTS[@]}"; do
              echo "  - ${artifact}"
            done
            echo ""
            echo "Per OPOJD v2.1: A job is COMPLETE only when all required Phase 1–4 obligations"
            echo "have been executed and all required artifacts are committed on the branch."
            echo ""
            echo "Missing Phase 4 artifacts place the session in BLOCKED / INCOMPLETE state."
            echo "A PR in this state must not be handed over for CS2 merge review."
            echo ""
            echo "Required action:"
            echo "  1. Create the missing artifact(s) listed above"
            echo "  2. Commit them to this branch"
            echo "  3. Re-run the pre-handover gate parity check locally"
            echo ""
            echo "Reference: governance/opojd/OPOJD_COMPLETE_JOB_HANDOVER_DOCTRINE.md v2.1 §1.3"
            echo "           governance/canon/MERGE_GATE_PHILOSOPHY.md v2.1.0 §Phase 4 Completeness Gate"
            exit 1
          fi

          echo "✅ governance-ceremony/phase4-completeness: PASS"
          echo "   All required Phase 4 artifacts present — job is in COMPLETE state"

  # Job 4: IAA Token Completeness Check
  # Detects PREHANDOVER proofs with PENDING IAA tokens and no matching token file
  # Enforcement per Issue #1336: Harden Foreman handover enforcement
  iaa-token-completeness:
    name: governance-ceremony/iaa-token-completeness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify IAA token completeness
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "=== Governance Ceremony — IAA Token Completeness Check (PR-Scoped) ==="
          echo "Authority: Issue #1336 — Foreman handover enforcement hardening"
          echo "Purpose: Detect PREHANDOVER proofs with PENDING IAA tokens"
          echo "Current PR: #${PR_NUMBER}"
          echo ""

          # -----------------------------------------------------------
          # Step 1: Find the PREHANDOVER proof for THIS PR
          # Primary: proof files changed in this PR's diff
          # Fallback: proof containing current PR number in content
          # Last resort: deterministic latest by filename sort
          # -----------------------------------------------------------
          PROOF_FILE=""

          # Strategy 1: Proof file added/modified in this PR's diff
          PR_PROOFS=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- '.agent-admin/prehandover/' 'PREHANDOVER_PROOF*.md' 2>/dev/null \
            | grep -E '(proof-|prehandover_proof|PREHANDOVER_PROOF)' | sort | tail -1 || true)

          if [ -n "$PR_PROOFS" ] && [ -f "$PR_PROOFS" ]; then
            PROOF_FILE="$PR_PROOFS"
            echo "Found PREHANDOVER proof changed in this PR: ${PROOF_FILE}"
          fi

          # Strategy 2: Proof containing PR number in content
          if [ -z "$PROOF_FILE" ]; then
            echo "No proof in PR diff. Searching proof content for PR #${PR_NUMBER}..."
            for CANDIDATE in .agent-admin/prehandover/proof-*.md .agent-admin/prehandover/prehandover_proof*.md PREHANDOVER_PROOF*.md; do
              if [ -f "$CANDIDATE" ] && grep -qE "(^|[^0-9])PR[# :]*${PR_NUMBER}([^0-9]|$)" "$CANDIDATE" 2>/dev/null; then
                PROOF_FILE="$CANDIDATE"
                echo "Found proof referencing PR #${PR_NUMBER}: ${PROOF_FILE}"
                break
              fi
            done
          fi

          # Strategy 3: Proof with PR number in filename
          if [ -z "$PROOF_FILE" ]; then
            for CANDIDATE in .agent-admin/prehandover/*"${PR_NUMBER}"*.md; do
              if [ -f "$CANDIDATE" ]; then
                PROOF_FILE="$CANDIDATE"
                echo "Found proof with PR number in filename: ${PROOF_FILE}"
                break
              fi
            done
          fi

          if [ -z "$PROOF_FILE" ]; then
            echo "ℹ️  No PREHANDOVER proof found for PR #${PR_NUMBER} — IAA token completeness check not applicable"
            echo "✅ governance-ceremony/iaa-token-completeness: PASS (no proof to validate)"
            exit 0
          fi

          echo ""

          # -----------------------------------------------------------
          # Step 2: Check if iaa_audit_token field contains PENDING
          # Handle all real-world proof formats:
          #   iaa_audit_token: PENDING                     — plain YAML-style
          #   **iaa_audit_token**: PENDING                 — markdown bold
          #   | iaa_audit_token | PENDING |                — table format
          #   `iaa_audit_token`: PENDING                   — backtick-formatted
          #   - **iaa_audit_token**: PENDING               — list-item bold
          # -----------------------------------------------------------
          IAA_TOKEN_VALUE=$(sed 's/\*\*//g; s/`//g' "$PROOF_FILE" | grep -i 'iaa_audit_token' | head -1 || echo "")

          if [ -z "$IAA_TOKEN_VALUE" ]; then
            echo "ℹ️  No iaa_audit_token field found in proof — skipping token completeness check"
            echo "✅ governance-ceremony/iaa-token-completeness: PASS (no token field)"
            exit 0
          fi

          echo "Token field value: ${IAA_TOKEN_VALUE}"
          echo ""

          # -----------------------------------------------------------
          # Step 3: If token field contains PENDING, require a PR-scoped token file
          # -----------------------------------------------------------
          if echo "$IAA_TOKEN_VALUE" | grep -qi "PENDING"; then
            echo "⚠️  PREHANDOVER proof has iaa_audit_token: PENDING"
            echo "Checking for a PR-scoped IAA token file..."
            echo ""

            MATCHED_TOKEN=""

            # Strategy A: Token filename contains current PR number
            MATCHED_TOKEN=$(find .agent-admin/assurance/ -maxdepth 1 \( \
              -name "assurance-token-*${PR_NUMBER}*" -o \
              -name "iaa-token-session-*${PR_NUMBER}*" -o \
              -name "iaa-assurance-token-*${PR_NUMBER}*" \
            \) 2>/dev/null | head -1 || true)

            if [ -n "$MATCHED_TOKEN" ]; then
              echo "Token matched by PR number in filename: ${MATCHED_TOKEN}"
            fi

            # Strategy B: Token files added in this PR's diff
            if [ -z "$MATCHED_TOKEN" ]; then
              echo "No filename match. Checking git diff for token files added in this PR..."
              DIFF_TOKENS=$(git diff --name-only --diff-filter=A "origin/${{ github.base_ref }}...HEAD" -- '.agent-admin/assurance/' 2>/dev/null \
                | grep -E '(assurance-token-|iaa-token-session-|iaa-assurance-token-)' || true)
              if [ -n "$DIFF_TOKENS" ]; then
                MATCHED_TOKEN=$(echo "$DIFF_TOKENS" | head -1)
                echo "Token found via PR diff: ${MATCHED_TOKEN}"
              fi
            fi

            # Strategy C: Token content references current PR number
            if [ -z "$MATCHED_TOKEN" ]; then
              echo "No diff-added token. Checking token content for PR #${PR_NUMBER}..."
              ALL_TOKENS=$(find .agent-admin/assurance/ -maxdepth 1 \( \
                -name "assurance-token-*.md" -o \
                -name "iaa-token-session-*.md" -o \
                -name "iaa-assurance-token-*.md" \
              \) 2>/dev/null || true)
              for CANDIDATE in $ALL_TOKENS; do
                if grep -qE "(^|[^0-9])PR[# :]*${PR_NUMBER}([^0-9]|$)" "$CANDIDATE" 2>/dev/null; then
                  MATCHED_TOKEN="$CANDIDATE"
                  echo "Token matched by PR reference in content: ${MATCHED_TOKEN}"
                  break
                fi
              done
            fi

            if [ -z "$MATCHED_TOKEN" ]; then
              echo "❌ GOVERNANCE CEREMONY — IAA TOKEN COMPLETENESS: FAIL"
              echo ""
              echo "PREHANDOVER proof for PR #${PR_NUMBER} has iaa_audit_token: PENDING"
              echo "but NO correlated IAA token file was found."
              echo ""
              echo "Token validation is PR-scoped:"
              echo "  - Token filename must contain '${PR_NUMBER}', OR"
              echo "  - Token must be newly added in this PR's diff, OR"
              echo "  - Token content must reference PR #${PR_NUMBER}"
              echo ""
              echo "Historical token files from other PRs do NOT satisfy this check."
              echo ""
              echo "Required action:"
              echo "  1. Invoke IAA agent for final audit: task(agent_type: 'independent-assurance-agent')"
              echo "  2. On ASSURANCE-TOKEN: commit token file to .agent-admin/assurance/"
              echo "  3. On REJECTION-PACKAGE: address all findings, re-run handover from §4.3"
              echo ""
              echo "Reference: Foreman contract §4.4 (IAA Invocation), §4.5 (Token Ceremony)"
              echo "           Issue #1336 — Foreman handover enforcement hardening"
              exit 1
            fi

            echo ""
            echo "✅ PR-scoped IAA token file found for PR #${PR_NUMBER}:"
            echo "   ${MATCHED_TOKEN}"
            echo ""
            echo "ℹ️  Note: PREHANDOVER proof immutability means the PENDING field may be"
            echo "   expected — the PR-scoped token file existence is the authoritative signal."
          else
            echo "✅ PREHANDOVER proof iaa_audit_token is not PENDING"
          fi

          echo ""
          echo "✅ governance-ceremony/iaa-token-completeness: PASS"
